name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Surface Dynatrace secrets as env vars so the step below can test for their
    # presence. The `secrets` context is not available in a step-level `if:`,
    # but `env` is.
    env:
      DT_URL: ${{ secrets.DT_URL }}
      DT_TOKEN: ${{ secrets.DT_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Build React Dashboard
        working-directory: ./client
        run: |
          npm install
          npm run build
          
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: westleyresource-5131d

      - name: Send deployment event to Dynatrace
        # Only run when Dynatrace secrets are configured. Without this guard the
        # action fails with `Input "url" is required` and marks the whole deploy
        # run red, even though the Firebase deploy above already succeeded.
        if: ${{ env.DT_URL != '' && env.DT_TOKEN != '' }}
        uses: dynatrace-oss/dynatrace-github-action@v9
        with:
          url: ${{ env.DT_URL }}
          token: ${{ env.DT_TOKEN }}
          events: |
            - type: CUSTOM_DEPLOYMENT
              properties:
                job: "Deploy to Firebase Hosting"
                status: "success"
                version: "${{ github.sha }}"
